[sovereign_fleet]
# Consolidated index for all RadhikaChain validator telemetry
# Proof of Karma consensus, eBPF network events, container metrics, audit trail
homePath = $SPLUNK_DB/sovereign_fleet/db
coldPath = $SPLUNK_DB/sovereign_fleet/colddb
thawedPath = $SPLUNK_DB/sovereign_fleet/thaweddb
frozenTimePeriodInSecs = 31536000
maxTotalDataSizeMB = 15360
maxHotBuckets = 10
maxWarmDBCount = 300
repFactor = auto
datatype = event
enableOnlineBucketRepair = 1
coldToFrozenDir = $SPLUNK_DB/sovereign_fleet/frozen
# Agent writes via HEC with dedicated token

[krittika_audit]
homePath = $SPLUNK_DB/krittika_audit/db
coldPath = $SPLUNK_DB/krittika_audit/colddb
thawedPath = $SPLUNK_DB/krittika_audit/thaweddb
frozenTimePeriodInSecs = 31536000
maxTotalDataSizeMB = 10240
maxHotBuckets = 10
maxWarmDBCount = 300
repFactor = auto
datatype = event
enableOnlineBucketRepair = 1
coldToFrozenDir = $SPLUNK_DB/krittika_audit/frozen
# Restricted write: only agent can write via HEC
