[krittika_audit]
homePath = $SPLUNK_DB/krittika_audit/db
coldPath = $SPLUNK_DB/krittika_audit/colddb
thawedPath = $SPLUNK_DB/krittika_audit/thaweddb
frozenTimePeriodInSecs = 31536000
maxTotalDataSizeMB = 10240
maxHotBuckets = 10
maxWarmDBCount = 300
repFactor = auto
datatype = event
enableOnlineBucketRepair = 1
coldToFrozenDir = $SPLUNK_DB/krittika_audit/frozen
# Restricted write: only sc_admin can write to this index
# Agent writes via HEC with dedicated token (read-only for other roles)

[krittika_consensus]
homePath = $SPLUNK_DB/krittika_consensus/db
coldPath = $SPLUNK_DB/krittika_consensus/colddb
thawedPath = $SPLUNK_DB/krittika_consensus/thaweddb
frozenTimePeriodInSecs = 2592000
maxTotalDataSizeMB = 5120

[krittika_network]
homePath = $SPLUNK_DB/krittika_network/db
coldPath = $SPLUNK_DB/krittika_network/colddb
thawedPath = $SPLUNK_DB/krittika_network/thaweddb
frozenTimePeriodInSecs = 2592000
maxTotalDataSizeMB = 5120

[krittika_metrics]
