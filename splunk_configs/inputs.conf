[krittika_telemetry]
# Monitor RadhikaChain consensus logs
monitor = /app/test_datasets/radhikachain_genesis.log
index = krittika_consensus
sourcetype = krittika:consensus
disabled = false
followTail = false
crcSalt = <SOURCE>

[krittika_ebpf]
# Monitor eBPF network telemetry
monitor = /app/test_datasets/ebpf_network_alerts.json
index = krittika_network
sourcetype = krittika:ebpf
disabled = false
followTail = false
crcSalt = <SOURCE>

[krittika_container]
# Monitor container resource metrics
monitor = /app/test_datasets/container_metrics.csv
index = krittika_metrics
sourcetype = krittika:container
disabled = false
followTail = false
crcSalt = <SOURCE>
