[krittika:consensus_fields]
REGEX = validator=(?P<validator_id>\S+)\s+block=(?P<block_height>\d+)\s+karma=(?P<karma_score>[\d.]+)\s+latency=(?P<latency_ms>\d+)ms
FORMAT = validator_id::$1 block_height::$2 karma_score::$3 latency_ms::$4
MV_ADD = true

[krittika:ebpf_fields]
REGEX = "src_ip":"(?P<src_ip>[^"]+)".*"dst_ip":"(?P<dst_ip>[^"]+)".*"dst_port":(?P<dst_port>\d+).*"proto":"(?P<proto>[^"]+)".*"tcp_flags":"(?P<tcp_flags>[^"]+)".*"pkt_size":(?P<pkt_size>\d+).*"anomaly":"(?P<anomaly>[^"]+)"
FORMAT = src_ip::$1 dst_ip::$2 dst_port::$3 proto::$4 tcp_flags::$5 pkt_size::$6 anomaly::$7
MV_ADD = true

[krittika:container_fields]
REGEX = (?P<timestamp>[^,]+),(?P<container_name>[^,]+),(?P<cpu_percent>[^,]+),(?P<mem_percent>[^,]+),(?P<mem_usage_mb>[^,]+),(?P<net_rx_bytes>[^,]+),(?P<net_tx_bytes>[^,]+),(?P<restart_count>[^,]+),(?P<status>[^,\n]+)
FORMAT = timestamp::$1 container_name::$2 cpu_percent::$3 mem_percent::$4 mem_usage_mb::$5 net_rx_bytes::$6 net_tx_bytes::$7 restart_count::$8 status::$9
MV_ADD = true

[krittika:audit_fields]
REGEX = "session_id":"(?P<session_id>[^"]+)".*"stage":"(?P<stage>[^"]+)".*"action":"(?P<action>[^"]+)".*"status":"(?P<status>[^"]+)" "prev_hash":"(?P<prev_hash>[^"]+)" "current_hash":"(?P<current_hash>[^"]+)"$
FORMAT = session_id::$1 stage::$2 action::$3 status::$4 prev_hash::$5 current_hash::$6
MV_ADD = true
