[karma_consensus_logs]
SHOULD_LINEMERGE = false
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
MAX_TIMESTAMP_LOOKAHEAD = 25
EXTRACT-validator = validator=(?P<validator_id>\S+)
EXTRACT-block = block=(?P<block_height>\d+)
EXTRACT-karma = karma=(?P<karma_score>[\d.]+)
EXTRACT-latency = latency=(?P<latency_ms>\d+)ms
EXTRACT-msg = msg="(?P<message>[^"]+)"
FIELD_DELIMITER = space
FIELD_NAMES = timestamp,component,validator_id,block_height,karma_score,latency_ms,message

[ebpf_traffic]
INDEXED_EXTRACTIONS = json
KV_MODE = json
TIME_PREFIX = "timestamp"
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
MAX_TIMESTAMP_LOOKAHEAD = 30
EXTRACT-src_ip = "src_ip":"(?P<src_ip>[^"]+)"
EXTRACT-dst_ip = "dst_ip":"(?P<dst_ip>[^"]+)"
EXTRACT-dst_port = "dst_port":(?P<dst_port>\d+)
EXTRACT-proto = "proto":"(?P<proto>[^"]+)"
EXTRACT-tcp_flags = "tcp_flags":"(?P<tcp_flags>[^"]+)"
EXTRACT-pkt_size = "pkt_size":(?P<pkt_size>\d+)
EXTRACT-ttl = "ttl":(?P<ttl>\d+)
EXTRACT-anomaly = "anomaly":"(?P<anomaly>[^"]+)"
EXTRACT-network_latency = "network_latency_ms":(?P<network_latency_ms>[\d.]+)
EXTRACT-source_node = "source_node":"(?P<source_node>[^"]+)"

[ebpf_kernel_events]
INDEXED_EXTRACTIONS = json
KV_MODE = json
TIME_PREFIX = "timestamp"
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
MAX_TIMESTAMP_LOOKAHEAD = 30
EXTRACT-process_name = "process_name":"(?P<process_name>[^"]+)"
EXTRACT-user = "user":"(?P<user>[^"]+)"
EXTRACT-pid = "pid":(?P<pid>\d+)
EXTRACT-host = "host":"(?P<host>[^"]+)"

[krittika:container]
SHOULD_LINEMERGE = false
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
MAX_TIMESTAMP_LOOKAHEAD = 25
FIELD_DELIMITER = ,
FIELD_NAMES = timestamp,container_name,cpu_percent,mem_percent,mem_usage_mb,net_rx_bytes,net_tx_bytes,restart_count,status

[krittika:audit]
INDEXED_EXTRACTIONS = json
KV_MODE = json
TIME_PREFIX = "timestamp"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 35
EXTRACT-session_id = "session_id":"(?P<session_id>[^"]+)"
EXTRACT-stage = "stage":"(?P<stage>[^"]+)"
EXTRACT-action = "action":"(?P<action>[^"]+)"
EXTRACT-status = "status":"(?P<status>[^"]+)"
EXTRACT-prev_hash = "prev_hash":"(?P<prev_hash>[^"]+)"
EXTRACT-current_hash = "current_hash":"(?P<current_hash>[^"]+)"
