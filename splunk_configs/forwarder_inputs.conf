# Splunk Universal Forwarder — inputs.conf (production)
# Monitors RadhikaChain validator log files in real-time (Sovereign Fleet)

[monitor:///var/log/radhikachain/proof-of-karma.log]
disabled = 0
index = sovereign_fleet
sourcetype = karma_consensus_logs
crcSalt = <SOURCE>
followTail = 0
ignoreOlderThan = 1d

[monitor:///var/log/radhikachain/mesh-network.log]
disabled = 0
index = sovereign_fleet
sourcetype = ebpf_traffic
crcSalt = <SOURCE>
followTail = 0
ignoreOlderThan = 1d
INDEXED_EXTRACTIONS = json
KV_MODE = json

[monitor:///var/log/radhikachain/container-metrics.log]
disabled = 0
index = sovereign_fleet
sourcetype = krittika:container
crcSalt = <SOURCE>
followTail = 0
ignoreOlderThan = 1d

[monitor:///var/log/radhikachain/audit.log]
disabled = 0
index = sovereign_fleet
sourcetype = krittika:audit
crcSalt = <SOURCE>
followTail = 0
ignoreOlderThan = 1d
