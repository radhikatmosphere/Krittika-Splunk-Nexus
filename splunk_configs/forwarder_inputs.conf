# Splunk Universal Forwarder — inputs.conf (production)
# Monitors RadhikaChain validator log files in real-time

[monitor:///var/log/radhikachain/proof-of-karma.log]
disabled = 0
index = krittika_consensus
sourcetype = krittika:consensus
crcSalt = <SOURCE>
followTail = 0
ignoreOlderThan = 1d

[monitor:///var/log/radhikachain/mesh-network.log]
disabled = 0
index = krittika_network
sourcetype = krittika:ebpf
crcSalt = <SOURCE>
followTail = 0
ignoreOlderThan = 1d
INDEXED_EXTRACTIONS = json
KV_MODE = json

[monitor:///var/log/radhikachain/container-metrics.log]
disabled = 0
index = krittika_metrics
sourcetype = krittika:container
crcSalt = <SOURCE>
followTail = 0
ignoreOlderThan = 1d

[monitor:///var/log/radhikachain/audit.log]
disabled = 0
index = krittika_audit
sourcetype = krittika:audit
crcSalt = <SOURCE>
followTail = 0
ignoreOlderThan = 1d
