[KSN - High Risk Action Detected]
search = index=krittika_audit (risk_level=high OR action="isolate_node" OR action="restart_service")
alert.severity = critical
alert.action.email = ops@radhika.io
alert.suppress = 1
alert.suppress.period = 1h
alert.track = 1
counttype = number of events
quantity = 1
relation = greater than or equal to
schedule_window = 0
cron_schedule = */5 * * * *
description = Triggers when the autonomous agent takes a high-risk action (node isolation or service restart)

[KSN - Repeated Remediation Failure]
search = index=krittika_audit stage=outcome status=FAILED | stats count as fail_count by session_id | where fail_count >= 3
alert.severity = critical
alert.action.email = ops@radhika.io
alert.suppress = 1
alert.suppress.period = 30m
alert.track = 1
counttype = number of events
quantity = 1
relation = greater than or equal to
schedule_window = 0
cron_schedule = */5 * * * *
description = Triggers when the same remediation session fails 3 or more times consecutively

[KSN - Consensus Latency Breach]
search = index=krittika_consensus sourcetype=krittika:consensus latency_ms > 500 | stats latest(latency_ms) as max_latency, latest(validator_id) as affected_validator by block_height
alert.severity = high
alert.track = 1
counttype = number of events
quantity = 1
relation = greater than or equal to
schedule_window = 0
cron_schedule = */2 * * * *
description = Triggers when any validator exceeds the 500ms latency threshold

[KSN - Network Port Scan Detected]
search = index=krittika_network sourcetype=krittika:ebpf anomaly=port_scan | stats count as scan_count by src_ip | where scan_count >= 5
alert.severity = high
alert.action.email = security@radhika.io
alert.suppress = 1
alert.suppress.period = 15m
alert.track = 1
counttype = number of events
quantity = 1
relation = greater than or equal to
schedule_window = 0
cron_schedule = */2 * * * *
description = Triggers when a single source IP performs 5 or more port scan events
